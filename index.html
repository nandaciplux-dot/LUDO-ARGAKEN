<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUDO ARGAKEN 🎲</title>
<style>
:root {
  --red: #ffe8ed;
--blue: #ebf5ff;
--yellow: #fffbed;

--green: #ebfaf2;
--purple: #f9f4ff;
--white: #ffffff;

--dark: #82828a;
--darker: #66666e;
--gold: #f7e7ab;
  --bg:
radial-gradient(circle at top,
#ffffff 0%,
#ffffff 1%,
#ffffff 2%,
#ffffff 3%,
#ffffff 4%,
#ffffff 5%,
#ffffff 6%,
#ffffff 7%,
#ffffff 8%,
#ffffff 9%,
#fefefe 10%,
#f8fbff 12%,
#f1f9ff 15%,
#e0f2fe 21%,
#dbeafe 29%,
#bfdbfe 40%,
#93c5fd 54%,
#60a5fa 68%,
#3b82f6 80%,
#2563eb 88%,
#1d4ed8 93%,
#172554 97%,
#0f172a 99%,
#020617 100%); --card: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Trebuchet MS',sans-serif; background:var(--darker); color:#fff; min-height:100vh; overflow-x:hidden; }

/* SCREENS */
.screen { display:none; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

/* MENU */
#menu { background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); }
.logo { text-align:center; margin-bottom:30px; }
.logo h1 { font-size:42px; font-weight:900; letter-spacing:4px; background:linear-gradient(45deg,#ffd700,#ff6b35,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-shadow:none; animation:shimmer 2s infinite; }
.logo p { color:#aaa; font-size:14px; letter-spacing:2px; }
@keyframes shimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }

.dice-anim { font-size:60px; text-align:center; animation:roll 1s infinite; margin:10px 0; }
@keyframes roll { 0%{transform:rotate(0)} 25%{transform:rotate(10deg)} 75%{transform:rotate(-10deg)} 100%{transform:rotate(0)} }

.menu-btn { display:block; width:100%; max-width:320px; padding:15px; margin:8px auto; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; transition:all .3s; letter-spacing:1px; }
.btn-primary { background:linear-gradient(135deg,#ffd700,#ff6b35); color:#1a1a2e; }
.btn-secondary { background:var(--card); color:#fff; border:1px solid rgba(255,255,255,0.2); backdrop-filter:blur(10px); }
.menu-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,0.3); }

/* SETUP */
#setup { background:linear-gradient(135deg,#1a1a2e,#0f3460); }
.setup-card { background:var(--card); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:25px; width:100%; max-width:380px; }
.setup-card h2 { text-align:center; margin-bottom:20px; color:var(--gold); }
.form-group { margin-bottom:15px; }
.form-group label { display:block; margin-bottom:6px; font-size:13px; color:#aaa; }
.form-group input, .form-group select { width:100%; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; font-size:14px; }
.form-group select option { background:#1a1a2e; }

.player-list { display:flex; flex-direction:column; gap:10px; margin:15px 0; }
.player-item { display:flex; align-items:center; gap:10px; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px; }
.player-color { width:30px; height:30px; border-radius:50%; flex-shrink:0; }
.player-item input { flex:1; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; font-size:13px; }
.player-item select { padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; font-size:12px; }

/* GAME SCREEN */
#game { background:#1a1a2e; padding:10px; justify-content:flex-start; }
.game-header { width:100%; max-width:500px; display:flex; justify-content:space-between; align-items:center; padding:8px 0; margin-bottom:8px; }
.game-title { font-size:16px; font-weight:900; color:var(--gold); letter-spacing:2px; }
.header-btns { display:flex; gap:8px; }
.icon-btn { background:var(--card); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:6px 10px; border-radius:8px; cursor:pointer; font-size:14px; }

/* BOARD */
.board-wrapper { position:relative; width:100%; max-width:380px; }
#ludo-board { width:100%; aspect-ratio:1; border-radius:12px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.5); }

/* PLAYER INFO */
.players-bar { width:100%; max-width:380px; display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:8px 0; }
.player-info { background:var(--card); border-radius:10px; padding:8px; text-align:center; border:2px solid transparent; transition:all .3s; }
.player-info.active { border-color:var(--gold); box-shadow:0 0 15px rgba(255,215,0,0.3); }
.player-info .p-name { font-size:11px; font-weight:700; }
.player-info .p-score { font-size:18px; font-weight:900; color:var(--gold); }
.player-info .p-status { font-size:10px; color:#aaa; }

/* DICE & CONTROLS */
.controls { width:100%; max-width:380px; display:flex; align-items:center; justify-content:space-between; padding:10px; background:var(--card); border-radius:15px; margin:8px 0; }
.dice-display { font-size:50px; cursor:pointer; transition:transform .1s; user-select:none; }
.dice-display.rolling { animation:diceRoll .5s; }
@keyframes diceRoll { 0%{transform:rotate(0) scale(1)} 25%{transform:rotate(180deg) scale(1.2)} 50%{transform:rotate(360deg) scale(0.8)} 75%{transform:rotate(540deg) scale(1.2)} 100%{transform:rotate(720deg) scale(1)} }
.turn-info { text-align:center; flex:1; }
.turn-name { font-size:13px; font-weight:700; }
.turn-action { font-size:11px; color:#aaa; }
#roll-btn { background:linear-gradient(135deg,#ffd700,#ff6b35); color:#1a1a2e; border:none; padding:12px 20px; border-radius:12px; font-size:14px; font-weight:900; cursor:pointer; transition:all .3s; }
#roll-btn:hover { transform:scale(1.05); }
#roll-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* TIMER */
.timer-bar { width:100%; max-width:380px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; margin-bottom:4px; }
.timer-fill { height:100%; background:linear-gradient(90deg,#2ecc71,#ffd700,#e74c3c); border-radius:3px; transition:width .1s linear; }

/* LOG */
.game-log { width:100%; max-width:380px; background:var(--card); border-radius:10px; padding:10px; height:80px; overflow-y:auto; font-size:11px; color:#aaa; }
.log-entry { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.05); }

/* CHAT */
.chat-box { width:100%; max-width:380px; display:flex; gap:8px; margin-top:8px; }
.chat-input { flex:1; padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; font-size:12px; }
.emoji-bar { display:flex; gap:5px; }
.emoji-btn { background:none; border:none; font-size:20px; cursor:pointer; transition:transform .2s; }
.emoji-btn:hover { transform:scale(1.3); }

/* WIN SCREEN */
#win-screen { background:linear-gradient(135deg,#1a1a2e,#0f3460); }
.win-card { background:var(--card); border-radius:20px; padding:30px; text-align:center; max-width:350px; width:100%; }
.win-emoji { font-size:80px; animation:bounce 1s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
.win-title { font-size:28px; font-weight:900; color:var(--gold); margin:15px 0 5px; }
.win-subtitle { color:#aaa; margin-bottom:20px; }

/* CONFETTI */
.confetti { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
.confetti-piece { position:absolute; width:10px; height:10px; top:-10px; animation:fall linear forwards; }
@keyframes fall { to{transform:translateY(110vh) rotate(720deg); opacity:0} }

/* SETTINGS */
#settings-screen { background:#1a1a2e; }
.settings-card { background:var(--card); border-radius:20px; padding:25px; width:100%; max-width:380px; }
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
.setting-row:last-child { border:none; }
.toggle { width:44px; height:24px; background:#333; border-radius:12px; cursor:pointer; position:relative; transition:.3s; }
.toggle.on { background:var(--green); }
.toggle::after { content:''; position:absolute; width:18px; height:18px; background:#fff; border-radius:50%; top:3px; left:3px; transition:.3s; }
.toggle.on::after { left:23px; }

/* TOURNAMENT */
#tournament-screen { background:#1a1a2e; }
.bracket { width:100%; max-width:400px; }
.bracket-round { margin-bottom:20px; }
.bracket-round h3 { color:var(--gold); margin-bottom:10px; font-size:14px; }
.bracket-match { display:flex; align-items:center; gap:10px; background:var(--card); border-radius:10px; padding:10px; margin-bottom:8px; }
.bracket-player { flex:1; text-align:center; font-size:13px; padding:6px; border-radius:6px; }
.bracket-vs { color:#aaa; font-size:12px; }

/* PAUSE */
.pause-overlay { display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; }
.pause-overlay.active { display:flex; }
.pause-card { background:#1a1a2e; border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:30px; text-align:center; }

/* MODAL */
.modal { display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.7); z-index:500; align-items:center; justify-content:center; }
.modal.active { display:flex; }
.modal-card { background:#1a1a2e; border-radius:20px; padding:25px; width:90%; max-width:320px; text-align:center; }
.modal-card h3 { color:var(--gold); margin-bottom:15px; }

/* CANVAS BOARD */
canvas { display:block; }

/* RESPONSIVE */
@media(max-width:400px) { .logo h1{font-size:32px} .dice-display{font-size:40px} }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="logo">
    <div class="dice-anim">🎲</div>
    <h1>LUDO ARGAKEN</h1>
    <p>GAME LUDO TERBAIK</p>
  </div>
  <button class="menu-btn btn-primary" onclick="showSetup('local')">🎮 Main Lokal (2-6 Pemain)</button>
  <button class="menu-btn btn-secondary" onclick="showSetup('tournament')">🏆 Turnamen (8 Pemain)</button>
  <button class="menu-btn btn-secondary" onclick="showScreen('settings-screen')">⚙️ Pengaturan</button>
  <button class="menu-btn btn-secondary" onclick="showHistory()">📜 Riwayat</button>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="setup-card">
    <h2>🎮 Pengaturan Pemain</h2>
    <div class="form-group">
      <label>Jumlah Pemain</label>
      <select id="player-count" onchange="updatePlayerList()">
        <option value="2">2 Pemain</option>
        <option value="3">3 Pemain</option>
        <option value="4" selected>4 Pemain</option>
        <option value="5">5 Pemain</option>
        <option value="6">6 Pemain</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tema Papan</label>
      <select id="board-theme">
        <option value="classic">Klasik</option>
        <option value="modern">Modern</option>
        <option value="night">Malam</option>
      </select>
    </div>
    <div class="form-group">
      <label>Bahasa</label>
      <select id="lang-select" onchange="setLang(this.value)">
        <option value="id">Indonesia</option>
        <option value="en">English</option>
      </select>
    </div>
    <div id="player-list" class="player-list"></div>
    <button class="menu-btn btn-primary" onclick="startGame()">▶ Mulai Game</button>
    <button class="menu-btn btn-secondary" onclick="showScreen('menu')">← Kembali</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <span class="game-title">🎲 LUDO ARGAKEN</span>
    <div class="header-btns">
      <button class="icon-btn" onclick="togglePause()">⏸</button>
      <button class="icon-btn" onclick="saveGame()">💾</button>
      <button class="icon-btn" onclick="showScreen('menu')">🏠</button>
    </div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  <div class="board-wrapper">
    <canvas id="ludo-board" width="380" height="380"></canvas>
  </div>
  <div id="players-bar" class="players-bar"></div>
  <div class="controls">
    <div class="dice-display" id="dice-display">⚀</div>
    <div class="turn-info">
      <div class="turn-name" id="turn-name">-</div>
      <div class="turn-action" id="turn-action">Lempar dadu</div>
    </div>
    <button id="roll-btn" onclick="rollDice()">🎲 LEMPAR</button>
  </div>
  <div class="game-log" id="game-log"></div>
  <div class="chat-box">
    <input class="chat-input" id="chat-input" placeholder="Kirim pesan..." onkeydown="if(event.key==='Enter')sendChat()">
    <div class="emoji-bar">
      <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
      <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
      <button class="emoji-btn" onclick="sendEmoji('😡')">😡</button>
      <button class="emoji-btn" onclick="sendEmoji('🎉')">🎉</button>
    </div>
  </div>
</div>

<!-- WIN -->
<div id="win-screen" class="screen">
  <div class="win-card">
    <div class="win-emoji">🏆</div>
    <div class="win-title" id="win-title">MENANG!</div>
    <div class="win-subtitle" id="win-subtitle"></div>
    <div id="final-scores" style="margin:15px 0;text-align:left"></div>
    <button class="menu-btn btn-primary" onclick="startGame()">🔄 Main Lagi</button>
    <button class="menu-btn btn-secondary" onclick="showScreen('menu')">🏠 Menu</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-screen" class="screen">
  <div class="settings-card">
    <h2 style="color:var(--gold);margin-bottom:20px;text-align:center">⚙️ Pengaturan</h2>
    <div class="setting-row">
      <span>🔊 Musik Latar</span>
      <div class="toggle on" id="toggle-music" onclick="toggleSetting('music')"></div>
    </div>
    <div class="setting-row">
      <span>🔔 Efek Suara</span>
      <div class="toggle on" id="toggle-sfx" onclick="toggleSetting('sfx')"></div>
    </div>
    <div class="setting-row">
      <span>🎊 Animasi Confetti</span>
      <div class="toggle on" id="toggle-confetti" onclick="toggleSetting('confetti')"></div>
    </div>
    <div class="setting-row">
      <span>📱 Ukuran Pion</span>
      <select onchange="settings.pionSize=this.value" style="background:#333;color:#fff;border:none;padding:5px;border-radius:6px">
        <option value="small">Kecil</option>
        <option value="medium" selected>Sedang</option>
        <option value="large">Besar</option>
      </select>
    </div>
    <div class="setting-row">
      <span>⏱️ Timer Giliran</span>
      <select onchange="settings.timerSec=parseInt(this.value)" style="background:#333;color:#fff;border:none;padding:5px;border-radius:6px">
        <option value="15">15 detik</option>
        <option value="30" selected>30 detik</option>
        <option value="60">60 detik</option>
      </select>
    </div>
    <button class="menu-btn btn-primary" style="margin-top:20px" onclick="showScreen('menu')">✅ Simpan</button>
  </div>
</div>

<!-- TOURNAMENT -->
<div id="tournament-screen" class="screen">
  <div style="width:100%;max-width:400px">
    <h2 style="color:var(--gold);text-align:center;margin-bottom:20px">🏆 Turnamen</h2>
    <div id="tournament-bracket" class="bracket"></div>
    <button class="menu-btn btn-primary" onclick="startTournament()">▶ Mulai Turnamen</button>
    <button class="menu-btn btn-secondary" onclick="showScreen('menu')">← Kembali</button>
  </div>
</div>

<!-- PAUSE -->
<div class="pause-overlay" id="pause-overlay">
  <div class="pause-card">
    <div style="font-size:40px">⏸️</div>
    <h2 style="color:var(--gold);margin:10px 0">GAME DIJEDA</h2>
    <button class="menu-btn btn-primary" onclick="togglePause()">▶ Lanjut</button>
    <button class="menu-btn btn-secondary" onclick="saveGame()">💾 Simpan</button>
    <button class="menu-btn btn-secondary" onclick="showScreen('menu')">🏠 Menu Utama</button>
  </div>
</div>

<!-- CONFETTI CANVAS -->
<canvas class="confetti" id="confetti-canvas"></canvas>

<script>
// ============ SETTINGS ============
const settings = { music:true, sfx:true, confetti:true, pionSize:'medium', timerSec:30, lang:'id' };

const LANG = {
  id: { roll:'LEMPAR', yourTurn:'Giliran kamu!', rolled:'Melempar', moved:'Memindahkan pion', captured:'Menangkap pion!', home:'Pion tiba di rumah!', sixAgain:'Dapat 6! Giliran lagi!', threeSix:'3x angka 6! Giliran hangus!', win:'MENANG!', gameOver:'Game Selesai' },
  en: { roll:'ROLL', yourTurn:'Your turn!', rolled:'Rolled', moved:'Moved token', captured:'Captured token!', home:'Token reached home!', sixAgain:'Got 6! Extra turn!', three六:'3x six! Turn forfeited!', win:'WIN!', gameOver:'Game Over' }
};
let lang = 'id';
function setLang(l){ lang=l; }
function t(k){ return LANG[lang][k]||LANG['id'][k]||k; }

// ============ COLORS ============
const COLORS = [
  { name:'Merah', hex:'#e74c3c', light:'#ff6b6b', home:[0,1,2,3] },
  { name:'Biru',  hex:'#3498db', light:'#74b9ff', home:[4,5,6,7] },
  { name:'Kuning',hex:'#f1c40f', light:'#fdcb6e', home:[8,9,10,11] },
  { name:'Hijau', hex:'#2ecc71', light:'#55efc4', home:[12,13,14,15] },
  { name:'Ungu',  hex:'#9b59b6', light:'#a29bfe', home:[16,17,18,19] },
  { name:'Putih', hex:'#ecf0f1', light:'#dfe6e9', home:[20,21,22,23] }
];

const DICE_EMOJI = ['⚀','⚁','⚂','⚃','⚄','⚅'];

// ============ GAME STATE ============
let G = {
  players: [],
  currentPlayer: 0,
  diceVal: 0,
  phase: 'roll', // roll | move
  consecutiveSix: 0,
  timerInterval: null,
  timerLeft: 30,
  paused: false,
  finished: [],
  log: [],
  mode: 'local'
};

// Board paths (simplified 52-step path per player)
// Each player has a starting index on the main track
const START_POS = [0, 13, 26, 39, 52, 65]; // relative to 78-step track for 6 players
const SAFE_SQUARES = [0, 8, 13, 21, 26, 34, 39, 47]; // safe zone indices

// ============ SETUP ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showSetup(mode) {
  G.mode = mode;
  if(mode==='tournament') { showScreen('tournament-screen'); setupTournament(); return; }
  showScreen('setup');
  updatePlayerList();
}

function updatePlayerList() {
  const n = parseInt(document.getElementById('player-count').value);
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  for(let i=0;i<n;i++) {
    const c = COLORS[i];
    list.innerHTML += `
      <div class="player-item">
        <div class="player-color" style="background:${c.hex}"></div>
        <input type="text" placeholder="${c.name}" id="pname-${i}" value="${c.name}">
        <select id="ptype-${i}">
          <option value="human">👤 Manusia</option>
          <option value="ai">🤖 AI</option>
        </select>
      </div>`;
  }
}

function startGame() {
  const n = parseInt(document.getElementById('player-count')?.value||4);
  const theme = document.getElementById('board-theme')?.value||'classic';
  G.players = [];
  G.finished = [];
  G.log = [];
  G.currentPlayer = 0;
  G.consecutiveSix = 0;
  G.phase = 'roll';
  G.diceVal = 0;

  for(let i=0;i<n;i++) {
    const nameEl = document.getElementById(`pname-${i}`);
    const typeEl = document.getElementById(`ptype-${i}`);
    G.players.push({
      name: nameEl?.value||COLORS[i].name,
      color: COLORS[i].hex,
      light: COLORS[i].light,
      type: typeEl?.value||'human',
      tokens: [-1,-1,-1,-1], // -1 = at home base, 0-51 = on board, 52+ = finished column
      score: 0,
      finishedTokens: 0
    });
  }

  showScreen('game');
  renderPlayersBar();
  drawBoard(theme);
  updateTurnUI();
  startTimer();
  addLog(`🎮 Game dimulai! ${n} pemain`);

  if(settings.music) playBGM();
  if(G.players[G.currentPlayer].type==='ai') setTimeout(aiTurn,1500);
}

// ============ BOARD DRAWING ============
function drawBoard(theme='classic') {
  const canvas = document.getElementById('ludo-board');
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const cell = size/15;

  // Themes
  const themes = {
    classic: { bg:'#f5f5dc', path:'#fff', border:'#333' },
    modern: { bg:'#2d3436', path:'#636e72', border:'#00cec9' },
    night: { bg:'#0d0d0d', path:'#1a1a2e', border:'#6c5ce7' }
  };
  const th = themes[theme]||themes.classic;

  // Background
  ctx.fillStyle = th.bg;
  ctx.fillRect(0,0,size,size);

  // Draw colored home areas (corners)
  const corners = [
    {x:0,y:0,color:COLORS[0].hex}, // Red top-left
    {x:9*cell,y:0,color:COLORS[1].hex}, // Blue top-right
    {x:0,y:9*cell,color:COLORS[2].hex}, // Yellow bottom-left
    {x:9*cell,y:9*cell,color:COLORS[3].hex}, // Green bottom-right
  ];

  corners.forEach(c=>{
    ctx.fillStyle=c.color;
    ctx.fillRect(c.x,c.y,6*cell,6*cell);
    // Inner white square
    ctx.fillStyle='#fff';
    ctx.fillRect(c.x+cell,c.y+cell,4*cell,4*cell);
  });

  // Draw center
  ctx.fillStyle = '#fff';
  ctx.fillRect(6*cell,6*cell,3*cell,3*cell);
  // Draw star in center
  ctx.fillStyle = '#ffd700';
  ctx.font = `${cell*2}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('⭐',size/2,size/2);

  // Draw path columns and rows
  // Main path squares
  drawPath(ctx, cell, th);

  // Draw tokens
  G.players.forEach((p,pi)=>{
    p.tokens.forEach((pos,ti)=>{
      drawToken(ctx, p, pi, ti, pos, cell, size);
    });
  });
}

function drawPath(ctx, cell, th) {
  // Simplified path rendering
  ctx.strokeStyle = th.border;
  ctx.lineWidth = 1;

  // Horizontal middle strip
  for(let col=0;col<15;col++){
    for(let row=6;row<=8;row++){
      if(col>=6&&col<=8&&row>=6&&row<=8) continue; // center
      if((col<6||col>8)){ // skip corner areas
        ctx.strokeRect(col*cell,row*cell,cell,cell);
      }
    }
  }
  // Vertical middle strip
  for(let row=0;row<15;row++){
    for(let col=6;col<=8;col++){
      if(col>=6&&col<=8&&row>=6&&row<=8) continue;
      if((row<6||row>8)){
        ctx.strokeRect(col*cell,row*cell,cell,cell);
      }
    }
  }

  // Safe squares stars
  ctx.fillStyle='#ffd700';
  ctx.font=`${cell*0.6}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  // Star markers on safe squares (visual positions)
  const safeVis = [{x:8.5,y:6.5},{x:6.5,y:1.5},{x:1.5,y:8.5},{x:13.5,y:6.5}];
  safeVis.forEach(s=>ctx.fillText('⭐',s.x*cell,s.y*cell));

  // Color arrows toward home
  const arrowColors = ['#e74c3c','#3498db','#f1c40f','#2ecc71'];
  const arrows = [
    {x:6.5,y:1,dx:0,dy:1,color:arrowColors[0]}, // red goes down col 6
    {x:13,y:6.5,dx:-1,dy:0,color:arrowColors[1]}, // blue goes left row 6
    {x:8.5,y:14,dx:0,dy:-1,color:arrowColors[2]}, // yellow goes up col 8
    {x:1,y:8.5,dx:1,dy:0,color:arrowColors[3]}, // green goes right row 8
  ];
  arrows.forEach(a=>{
    ctx.fillStyle=a.color+'88';
    for(let i=0;i<5;i++){
      ctx.fillRect((a.x+a.dx*i)*cell,(a.y+a.dy*i)*cell,cell,cell);
    }
  });
}

function getTokenScreenPos(playerIdx, tokenIdx, pos, cell, size) {
  // Home base positions
  const homePositions = [
    [[1.5,1.5],[2.5,1.5],[1.5,2.5],[2.5,2.5]], // Red
    [[10.5,1.5],[11.5,1.5],[10.5,2.5],[11.5,2.5]], // Blue
    [[1.5,10.5],[2.5,10.5],[1.5,11.5],[2.5,11.5]], // Yellow
    [[10.5,10.5],[11.5,10.5],[10.5,11.5],[11.5,11.5]], // Green
    [[3.5,3.5],[4.5,3.5],[3.5,4.5],[4.5,4.5]], // Purple (extra)
    [[9.5,9.5],[10.5,9.5],[9.5,10.5],[10.5,10.5]], // White (extra)
  ];

  if(pos===-1) {
    const hp = homePositions[playerIdx%homePositions.length][tokenIdx];
    return {x:hp[0]*cell, y:hp[1]*cell};
  }

  // Main track positions (simplified 52 squares)
  const trackPath = generateTrackPath(cell);
  const playerStart = [0,13,26,39,0,13];
  const startIdx = playerStart[playerIdx%6];
  const actualPos = (startIdx + pos) % 52;

  if(actualPos < trackPath.length) return trackPath[actualPos];
  return {x:size/2, y:size/2};
}

function generateTrackPath(cell) {
  // 52 squares around the board
  const path = [];
  // Bottom of top-left corner going right
  for(let i=0;i<6;i++) path.push({x:(i+0.5)*cell,y:6.5*cell});
  // Going up right side of left strip
  path.push({x:6.5*cell,y:5.5*cell});
  path.push({x:6.5*cell,y:4.5*cell});
  path.push({x:6.5*cell,y:3.5*cell});
  path.push({x:6.5*cell,y:2.5*cell});
  path.push({x:6.5*cell,y:1.5*cell});
  path.push({x:6.5*cell,y:0.5*cell});
  // Top strip going right
  for(let i=0;i<6;i++) path.push({x:(7.5+i)*cell,y:0.5*cell});
  // Right side going down
  for(let i=0;i<6;i++) path.push({x:13.5*cell,y:(1.5+i)*cell});
  // Middle right going left
  path.push({x:14.5*cell,y:7.5*cell});
  path.push({x:14.5*cell,y:8.5*cell});
  path.push({x:13.5*cell,y:8.5*cell});
  path.push({x:12.5*cell,y:8.5*cell});
  path.push({x:11.5*cell,y:8.5*cell});
  path.push({x:10.5*cell,y:8.5*cell});
  path.push({x:9.5*cell,y:8.5*cell});
  // Bottom strip
  for(let i=0;i<6;i++) path.push({x:(8.5-i)*cell,y:13.5*cell});
  // Left side going up
  for(let i=0;i<6;i++) path.push({x:1.5*cell,y:(12.5-i)*cell});
  // Middle left going right
  path.push({x:0.5*cell,y:7.5*cell});
  path.push({x:0.5*cell,y:6.5*cell});
  path.push({x:1.5*cell,y:6.5*cell});
  path.push({x:2.5*cell,y:6.5*cell});
  path.push({x:3.5*cell,y:6.5*cell});
  path.push({x:4.5*cell,y:6.5*cell});
  path.push({x:5.5*cell,y:6.5*cell});
  return path;
}

function drawToken(ctx, player, playerIdx, tokenIdx, pos, cell, size) {
  const sp = getTokenScreenPos(playerIdx, tokenIdx, pos, cell, size);
  const r = settings.pionSize==='small'?cell*0.3:settings.pionSize==='large'?cell*0.45:cell*0.38;

  ctx.beginPath();
  ctx.arc(sp.x,sp.y,r,0,Math.PI*2);
  ctx.fillStyle=player.color;
  ctx.fill();
  ctx.strokeStyle='#fff';
  ctx.lineWidth=2;
  ctx.stroke();

  // Token number
  ctx.fillStyle='#fff';
  ctx.font=`bold ${r*0.9}px sans-serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(tokenIdx+1,sp.x,sp.y);
}

// ============ GAME LOGIC ============
function rollDice() {
  if(G.phase!=='roll'||G.paused) return;
  const val = Math.floor(Math.random()*6)+1;
  G.diceVal = val;

  // Animate dice
  const diceEl = document.getElementById('dice-display');
  diceEl.classList.add('rolling');
  let frames = 0;
  const anim = setInterval(()=>{
    diceEl.textContent = DICE_EMOJI[Math.floor(Math.random()*6)];
    frames++;
    if(frames>8){ clearInterval(anim); diceEl.textContent=DICE_EMOJI[val-1]; diceEl.classList.remove('rolling'); afterRoll(val); }
  },60);

  playSFX('dice');
}

function afterRoll(val) {
  const p = G.players[G.currentPlayer];
  addLog(`🎲 ${p.name} melempar ${val}`);
  document.getElementById('turn-action').textContent = `Melempar ${val}`;

  // Check triple six
  if(val===6) {
    G.consecutiveSix++;
    if(G.consecutiveSix>=3) {
      addLog(`❌ ${p.name} dapat 3x angka 6! Giliran hangus!`);
      G.consecutiveSix=0;
      playSFX('fail');
      setTimeout(nextTurn,1200);
      return;
    }
  } else { G.consecutiveSix=0; }

  // Check movable tokens
  const movable = getMovableTokens(G.currentPlayer, val);
  if(movable.length===0) {
    addLog(`⚠️ ${p.name} tidak bisa bergerak`);
    if(val===6) { setTimeout(()=>{ G.phase='roll'; updateTurnUI(); },800); }
    else setTimeout(nextTurn,1000);
    return;
  }

  G.phase='move';
  document.getElementById('roll-btn').disabled=true;
  document.getElementById('turn-action').textContent='Pilih pion untuk digerakkan';
  highlightMovable(movable, val);

  if(p.type==='ai') { setTimeout(()=>aiMove(movable,val),1000); }
}

function getMovableTokens(playerIdx, val) {
  const p = G.players[playerIdx];
  const movable = [];
  p.tokens.forEach((pos,ti)=>{
    if(pos===-1 && val===6) movable.push(ti); // can enter board
    else if(pos>=0 && pos<52) { // on board
      if(pos+val<=56) movable.push(ti); // can move (56 = finish zone)
    }
  });
  return movable;
}

function highlightMovable(movable, val) {
  // Visual highlight is handled in drawBoard
  drawBoard(document.getElementById('board-theme')?.value||'classic');
  const canvas = document.getElementById('ludo-board');
  const ctx = canvas.getContext('2d');
  const cell = canvas.width/15;

  movable.forEach(ti=>{
    const p = G.players[G.currentPlayer];
    const pos = p.tokens[ti];
    const sp = getTokenScreenPos(G.currentPlayer,ti,pos,cell,canvas.width);
    ctx.beginPath();
    ctx.arc(sp.x,sp.y,cell*0.5,0,Math.PI*2);
    ctx.strokeStyle='#ffd700';
    ctx.lineWidth=3;
    ctx.stroke();
  });

  // Make tokens clickable
  canvas.onclick = (e)=>{
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
    const my=(e.clientY-rect.top)*(canvas.height/rect.height);
    movable.forEach(ti=>{
      const sp=getTokenScreenPos(G.currentPlayer,ti,G.players[G.currentPlayer].tokens[ti],cell,canvas.width);
      const dist=Math.sqrt((mx-sp.x)**2+(my-sp.y)**2);
      if(dist<cell*0.6) moveToken(G.currentPlayer,ti,val);
    });
  };
}

function moveToken(playerIdx, tokenIdx, val) {
  const p = G.players[playerIdx];
  if(p.tokens[tokenIdx]===-1) { p.tokens[tokenIdx]=0; }
  else { p.tokens[tokenIdx]+=val; }

  // Check if finished
  if(p.tokens[tokenIdx]>=52) {
    p.tokens[tokenIdx]=52;
    p.finishedTokens++;
    p.score+=100;
    addLog(`🏠 ${p.name} pion ${tokenIdx+1} sampai rumah!`);
    playSFX('home');
    if(p.finishedTokens>=4) { endGame(playerIdx); return; }
  }

  // Check capture
  if(p.tokens[tokenIdx]<52) {
    checkCapture(playerIdx, tokenIdx);
  }

  playSFX('move');
  addLog(`➡️ ${p.name} menggerakkan pion ${tokenIdx+1}`);
  document.getElementById('ludo-board').onclick=null;
  G.phase='roll';

  const theme=document.getElementById('board-theme')?.value||'classic';
  drawBoard(theme);
  renderPlayersBar();

  if(val===6) {
    addLog(`🎉 ${p.name} dapat 6! Giliran lagi!`);
    playSFX('six');
    updateTurnUI();
  } else { nextTurn(); }
}

function checkCapture(playerIdx, tokenIdx) {
  const pos = G.players[playerIdx].tokens[tokenIdx];
  const boardPos = (START_POS[playerIdx%6]+pos)%52;

  if(SAFE_SQUARES.includes(boardPos)) return; // safe zone

  G.players.forEach((op,oi)=>{
    if(oi===playerIdx) return;
    op.tokens.forEach((opos,oti)=>{
      if(opos<0||opos>=52) return;
      const oBoardPos=(START_POS[oi%6]+opos)%52;
      if(oBoardPos===boardPos) {
        op.tokens[oti]=-1;
        G.players[playerIdx].score+=50;
        addLog(`💥 ${G.players[playerIdx].name} menangkap pion ${G.players[oi].name}!`);
        playSFX('capture');
      }
    });
  });
}

function aiMove(movable, val) {
  // AI picks best token (prefer capturing, then furthest ahead)
  const ti = movable[Math.floor(Math.random()*movable.length)];
  moveToken(G.currentPlayer, ti, val);
}

function aiTurn() {
  if(G.phase==='roll' && G.players[G.currentPlayer].type==='ai') {
    rollDice();
  }
}

function nextTurn() {
  stopTimer();
  G.currentPlayer=(G.currentPlayer+1)%G.players.length;
  // Skip finished players
  let tries=0;
  while(G.players[G.currentPlayer].finishedTokens>=4 && tries<G.players.length) {
    G.currentPlayer=(G.currentPlayer+1)%G.players.length;
    tries++;
  }
  G.phase='roll';
  G.diceVal=0;
  document.getElementById('roll-btn').disabled=false;
  updateTurnUI();
  renderPlayersBar();
  startTimer();
  if(G.players[G.currentPlayer].type==='ai') setTimeout(aiTurn,1500);
}

function updateTurnUI() {
  const p = G.players[G.currentPlayer];
  document.getElementById('turn-name').textContent=`${p.name} (${p.type==='ai'?'🤖':'👤'})`;
  document.getElementById('turn-name').style.color=p.color;
  document.getElementById('turn-action').textContent='Lempar dadu';
  document.getElementById('roll-btn').disabled=(p.type==='ai');
}

function renderPlayersBar() {
  const bar = document.getElementById('players-bar');
  bar.innerHTML='';
  bar.style.gridTemplateColumns=`repeat(${Math.min(G.players.length,3)},1fr)`;
  G.players.forEach((p,i)=>{
    bar.innerHTML+=`
      <div class="player-info${i===G.currentPlayer?' active':''}" style="border-color:${i===G.currentPlayer?p.color:'transparent'}">
        <div class="p-name" style="color:${p.color}">${p.name}</div>
        <div class="p-score">${p.score}</div>
        <div class="p-status">🏠${p.finishedTokens}/4</div>
      </div>`;
  });
}

function startTimer() {
  G.timerLeft = settings.timerSec;
  const fill = document.getElementById('timer-fill');
  fill.style.width='100%';
  G.timerInterval = setInterval(()=>{
    if(G.paused) return;

    if(G.timerLeft<=0) {
      stopTimer();
      addLog(`⏰ ${G.players[G.currentPlayer].name} kehabisan waktu!`);
      nextTurn();
    }
  },1000);
}

function stopTimer() {

}

function endGame(winnerIdx) {
  stopTimer();
  const w = G.players[winnerIdx];
  document.getElementById('win-title').textContent=`🏆 ${w.name} ${t('win')}`;
  document.getElementById('win-subtitle').textContent=`Selamat! Semua pion berhasil masuk rumah!`;
  document.getElementById('win-subtitle').style.color=w.color;

  // Sort by finished tokens then score
  const sorted=[...G.players].sort((a,b)=>b.finishedTokens-a.finishedTokens||b.score-a.score);
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
  document.getElementById('final-scores').innerHTML=sorted.map((p,i)=>`
    <div style="display:flex;justify-content:space-between;padding:6px;border-radius:6px;margin:3px 0;background:rgba(255,255,255,0.05)">
      <span>${medals[i]} <span style="color:${p.color}">${p.name}</span></span>
      <span>${p.score} pts | 🏠${p.finishedTokens}</span>
    </div>`).join('');

  showScreen('win-screen');
  if(settings.confetti) launchConfetti(w.color);
  playSFX('win');
}

// ============ CONFETTI ============
function launchConfetti(color) {
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=[];
  const colors=[color,'#ffd700','#fff','#ff6b35','#74b9ff'];
  for(let i=0;i<120;i++) pieces.push({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-0.5)*4,vy:Math.random()*5+2,color:colors[Math.floor(Math.random()*colors.length)],r:Math.random()*8+4,rot:Math.random()*360,vr:(Math.random()-0.5)*10,alpha:1});
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.alpha-=0.005;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();});
    frame++;
    if(frame<200) requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ============ SOUND ============
let audioCtx = null;
function getAudioCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playSFX(type) {
  if(!settings.sfx) return;
  try {
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const sounds={dice:{f:300,d:0.15,type:'square'},move:{f:440,d:0.1,type:'sine'},capture:{f:200,d:0.3,type:'sawtooth'},home:{f:600,d:0.4,type:'sine'},six:{f:520,d:0.3,type:'sine'},win:{f:880,d:1,type:'sine'},fail:{f:150,d:0.4,type:'square'}};
    const s=sounds[type]||sounds.move;
    osc.type=s.type; osc.frequency.setValueAtTime(s.f,ctx.currentTime);
    if(type==='win'){osc.frequency.linearRampToValueAtTime(s.f*1.5,ctx.currentTime+0.3);}
    gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s.d);
    osc.start(); osc.stop(ctx.currentTime+s.d);
  } catch(e){}
}

let bgmInterval = null;
function playBGM() {
  if(!settings.music) return;
  let beat=0;
  bgmInterval=setInterval(()=>{
    if(!settings.music){clearInterval(bgmInterval);return;}
    try{const ctx=getAudioCtx();const osc=ctx.createOscillator();const g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);const notes=[261,294,330,349,392,440];osc.frequency.value=notes[beat%notes.length];osc.type='triangle';g.gain.setValueAtTime(0.05,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);osc.start();osc.stop(ctx.currentTime+0.2);beat++;}catch(e){}
  },400);
}

      const data=JSON.parse(saved);
      alert(`Riwayat terakhir:\nPemain: ${data.players.map(p=>p.name).join(', ')}\nGiliran terakhir: Pemain ${data.currentPlayer+1}`);
    } else { alert('Belum ada riwayat game tersimpan.'); }
  } catch(e){ alert('Belum ada riwayat.'); }
}

// ============ TOAST ============
function showToast(msg) {
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;z-index:9999;font-size:13px;';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ============ INIT ============
updatePlayerList();

// Check for saved game
try {
  if(localStorage.getItem('ludo_save')) {
    const btn=document.createElement('button');
    btn.className='menu-btn btn-secondary';
    btn.textContent='📂 Lanjutkan Game';
    btn.onclick=loadGame;
    document.querySelector('#menu').insertBefore(btn, document.querySelector('#menu .menu-btn:last-child'));
  }
} catch(e){}
</script>
